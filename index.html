<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I have a magic trick for you ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sky" aria-hidden="true">
    <div class="sky-gradient"></div>
    <div class="stars" id="stars"></div>
    <div class="twinkles" id="twinkles"></div>
  </div>

  <div class="glow-orbs" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
  </div>

  <div class="rabbit-runway" aria-hidden="true">
    <div class="rabbit-racer">
      <div class="rabbit-racer__bob">
        <svg class="rabbit-racer__svg" viewBox="0 0 64 56" width="56" height="49" role="img">
          <title>Magic rabbit</title>
          <ellipse cx="32" cy="22" rx="22" ry="6" fill="#2a2248" />
          <rect x="18" y="8" width="28" height="16" rx="2" fill="#4a3f8c" stroke="#d4a84b" stroke-width="1" />
          <rect x="22" y="4" width="20" height="8" rx="1" fill="#6b5fd4" />
          <ellipse cx="22" cy="30" rx="5" ry="14" fill="#e8b4b8" transform="rotate(-12 22 30)" />
          <ellipse cx="42" cy="30" rx="5" ry="14" fill="#e8b4b8" transform="rotate(12 42 30)" />
          <ellipse cx="32" cy="36" rx="16" ry="14" fill="#f5e6e8" />
          <circle cx="26" cy="34" r="3" fill="#2a2248" />
          <circle cx="38" cy="34" r="3" fill="#2a2248" />
          <path d="M28 42 Q32 46 36 42" fill="none" stroke="#c47a6a" stroke-width="1.5" stroke-linecap="round" />
          <ellipse cx="32" cy="50" rx="12" ry="8" fill="#f0d4d8" />
        </svg>
        <span class="rabbit-racer__stars" aria-hidden="true">✨</span>
      </div>
    </div>
  </div>

  <main class="stage">
    <section class="panel intro-panel" id="intro-panel" aria-labelledby="main-title">
      <h1 class="title" id="main-title">I have a magic trick for you ✨</h1>
      <button type="button" class="btn btn-primary" id="start-btn">
        Click for the magic to begin
      </button>
    </section>

    <section
      class="panel magic-panel"
      id="magic-panel"
      hidden
      aria-live="polite"
      aria-label="Choose your cards"
    >
      <div class="magic-veil" id="magic-veil"></div>

      <div class="fan-wrap" id="fan-wrap">
        <div class="fan" id="fan" role="group" aria-label="Spread deck"></div>
      </div>

      <p class="phase-text" id="phase-text"></p>

      <div class="choice-result" id="choice-result" hidden>
        <p class="log-title" id="log-title">Your message ✨</p>
        <p class="sentence-assembly" id="sentence-assembly" aria-live="polite"></p>
      </div>
    </section>

    <button
      type="button"
      class="btn-sound"
      id="sound-toggle"
      aria-pressed="true"
      title="Turn sound on or off"
    >
      <span class="sound-on" aria-hidden="true">🔔</span>
      <span class="sound-off" hidden aria-hidden="true">🔕</span>
    </button>
  </main>

  <div
    class="finale-overlay"
    id="finale-overlay"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="finale-title"
    aria-hidden="true"
  >
    <div class="finale-backdrop" aria-hidden="true"></div>
    <div class="finale-content">
      <div class="finale-sparkles" id="finale-sparkles" aria-hidden="true"></div>
      <div class="finale-heart-wrap">
        <svg class="finale-heart-svg" viewBox="0 0 200 190" width="280" height="266" aria-hidden="true">
          <defs>
            <linearGradient id="finaleHeartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff8fab" />
              <stop offset="45%" stop-color="#c9184a" />
              <stop offset="100%" stop-color="#ff5d8f" />
            </linearGradient>
            <filter id="finaleHeartGlow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <path
            class="finale-heart-path"
            fill="url(#finaleHeartGrad)"
            filter="url(#finaleHeartGlow)"
            d="M100 178 C24 108 4 62 4 42 C4 17 24 2 49 2 C72 2 88 16 100 36 C112 16 128 2 151 2 C176 2 196 17 196 42 C196 62 176 108 100 178Z"
          />
        </svg>
        <p class="finale-words" id="finale-title">te quiero</p>
      </div>
      <p class="finale-magic-line" aria-hidden="true">✦ ✨ ✦</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
